<style>
  .abt {
    position: relative;
    font-family: var(--config--main-font-family, system-ui, sans-serif);
    color: var(--config--main-color-text, #1f2a44);
    padding: 32px 28px;
    border-radius: 12px;
    background: var(--config--main-color-background, #ffffff);
    border: 1px solid var(--config--main-color-border, #e5e7eb);
    text-align: center;
    overflow: hidden;
  }
  .abt__title {
    margin: 0 0 10px;
    font-size: 24px;
    font-weight: 700;
    color: var(--config--main-color-brand, #1f2a44);
    line-height: 1.25;
  }
  .abt__subtitle {
    margin: 0 0 22px;
    font-size: 15px;
    opacity: 0.85;
    line-height: 1.5;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }
  .abt__cta {
    display: inline-block;
    padding: 10px 22px;
    border-radius: 999px;
    background: var(--config--main-color-brand, #2563eb);
    color: #ffffff;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
  }
  .abt__cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(37, 99, 235, 0.4);
  }
  .abt__cta.is-hidden { display: none; }

  .abt__variant-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 3px 9px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.65);
    color: #ffffff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    pointer-events: none;
    display: none;
  }
  .abt__variant-badge.is-shown { display: inline-block; }

  .abt__skeleton {
    /* Tiny pre-render placeholder so the widget has size before JS swaps content */
    min-height: 120px;
  }
</style>

<div class="abt" id="abtRoot" data-abt-state="loading">
  <span class="abt__variant-badge" id="abtVariantBadge">Variant</span>
  <div class="abt__skeleton">
    <h2 class="abt__title" id="abtTitle">&nbsp;</h2>
    <p class="abt__subtitle" id="abtSubtitle">&nbsp;</p>
    <a class="abt__cta is-hidden" id="abtCta" href="#" rel="noopener noreferrer" target="_blank">&nbsp;</a>
  </div>
</div>

<script type="module" src="app.js"></script>
