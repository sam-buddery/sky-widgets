<style>
  .sky-widget {
    position: relative;
    font-family: var(--config--main-font-family, system-ui, sans-serif);
    color: var(--config--main-color-text, #1f2a44);
    border-radius: 14px;
    overflow: hidden;
    min-height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    isolation: isolate;
    background: linear-gradient(180deg, #87ceeb 0%, #b6e0f4 55%, #f6f1d8 100%);
    transition: background 0.6s ease;
  }

  /* Sky-inspired brand header */
  .sky-widget__brand {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }
  .sky-widget--night .sky-widget__brand {
    background: rgba(11, 26, 58, 0.7);
    border-bottom-color: rgba(255, 255, 255, 0.08);
  }
  .sky-widget__brand-mark {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #ec4899;
    font-size: 18px;
  }
  .sky-widget--night .sky-widget__brand-mark { color: #f9a8d4; }
  .sky-widget__brand-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(0, 0, 0, 0.55);
  }
  .sky-widget--night .sky-widget__brand-tag { color: rgba(255, 255, 255, 0.65); }
  .sky-widget__brand-stripe {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 3px;
    background: linear-gradient(
      90deg,
      #ff7e3d 0%,
      #ff4d8b 25%,
      #c64bff 55%,
      #4a78ff 85%,
      #00a0e2 100%
    );
  }
  .sky-widget--night {
    background: linear-gradient(180deg, #0b1a3a 0%, #1c2c55 55%, #2b1a4a 100%);
    color: #f3f0e7;
  }

  .sky-widget__scene {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .sky-widget__orb {
    position: absolute;
    top: 18%;
    right: 14%;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff6c5, #ffd86b 55%, #ffae3b 100%);
    box-shadow: 0 0 60px 12px rgba(255, 216, 107, 0.55);
    transition: background 0.6s ease, box-shadow 0.6s ease, transform 0.6s ease;
  }
  .sky-widget--night .sky-widget__orb {
    background: radial-gradient(circle at 38% 38%, #fefbe9, #e7e2c5 55%, #b8b292 100%);
    box-shadow: 0 0 50px 6px rgba(238, 232, 200, 0.35);
  }

  .sky-widget__cloud {
    position: absolute;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 50px;
    filter: blur(0.5px);
    animation: drift linear infinite;
  }
  .sky-widget--night .sky-widget__cloud { background: rgba(255, 255, 255, 0.12); }
  .sky-widget__cloud::before,
  .sky-widget__cloud::after {
    content: "";
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }
  .sky-widget__cloud--1 {
    width: 120px; height: 28px; top: 22%; left: -130px;
    animation-duration: 38s;
  }
  .sky-widget__cloud--1::before { width: 50px; height: 50px; top: -22px; left: 18px; }
  .sky-widget__cloud--1::after  { width: 36px; height: 36px; top: -14px; left: 64px; }
  .sky-widget__cloud--2 {
    width: 90px; height: 22px; top: 58%; left: -110px;
    animation-duration: 52s; animation-delay: -12s;
  }
  .sky-widget__cloud--2::before { width: 40px; height: 40px; top: -18px; left: 14px; }
  .sky-widget__cloud--2::after  { width: 28px; height: 28px; top: -10px; left: 48px; }
  .sky-widget__cloud--3 {
    width: 70px; height: 18px; top: 40%; left: -90px;
    animation-duration: 64s; animation-delay: -28s;
  }
  .sky-widget__cloud--3::before { width: 32px; height: 32px; top: -14px; left: 10px; }
  .sky-widget__cloud--3::after  { width: 24px; height: 24px; top: -8px; left: 38px; }
  @keyframes drift {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100% + 110vw)); }
  }

  .sky-widget__stars {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.6s ease;
    background-image:
      radial-gradient(1px 1px at 10% 18%, #fff, transparent 50%),
      radial-gradient(1px 1px at 22% 9%, #fff, transparent 50%),
      radial-gradient(1.5px 1.5px at 35% 30%, #fff, transparent 50%),
      radial-gradient(1px 1px at 50% 14%, #fff, transparent 50%),
      radial-gradient(1px 1px at 65% 25%, #fff, transparent 50%),
      radial-gradient(1.5px 1.5px at 78% 12%, #fff, transparent 50%),
      radial-gradient(1px 1px at 88% 28%, #fff, transparent 50%),
      radial-gradient(1px 1px at 15% 40%, #fff, transparent 50%),
      radial-gradient(1px 1px at 42% 48%, #fff, transparent 50%),
      radial-gradient(1px 1px at 70% 45%, #fff, transparent 50%);
  }
  .sky-widget--night .sky-widget__stars { opacity: 1; animation: twinkle 4s ease-in-out infinite; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.85; }
    50%      { opacity: 1; }
  }

  .sky-widget__content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 64px 28px 36px;
    max-width: 90%;
  }

  .sky-widget__badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    margin-bottom: 14px;
    border-radius: 999px;
    background: linear-gradient(
      120deg,
      #ff7e3d 0%,
      #ff4d8b 30%,
      #c64bff 60%,
      #4a78ff 100%
    );
    background-size: 200% 100%;
    color: #ffffff;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow:
      0 4px 14px rgba(198, 75, 255, 0.45),
      inset 0 1px 0 rgba(255, 255, 255, 0.4);
    animation: shimmer 4s linear infinite;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
  }
  .sky-widget--night .sky-widget__badge {
    box-shadow:
      0 4px 18px rgba(198, 75, 255, 0.55),
      inset 0 1px 0 rgba(255, 255, 255, 0.4);
  }
  .sky-widget__badge-star {
    font-size: 13px;
    line-height: 1;
  }
  @keyframes shimmer {
    from { background-position: 0% 0; }
    to   { background-position: 200% 0; }
  }

  .sky-widget__title {
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 8px;
    color: var(--config--main-color-brand, currentColor);
    text-shadow: 0 2px 14px rgba(0, 0, 0, 0.12);
    letter-spacing: -0.01em;
  }
  .sky-widget--night .sky-widget__title {
    color: var(--config--main-color-brand, #ffd86b);
    text-shadow: 0 2px 14px rgba(0, 0, 0, 0.5);
  }
  .sky-widget__subtitle {
    font-size: 15px;
    margin: 0 0 18px;
    opacity: 0.88;
    font-style: italic;
    max-width: 460px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.55;
  }
  .sky-widget__cta {
    display: inline-block;
    padding: 11px 24px;
    border-radius: 999px;
    background: var(--config--main-color-brand, #ec4899);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    box-shadow: 0 6px 18px rgba(236, 72, 153, 0.45);
  }
  .sky-widget--night .sky-widget__cta {
    background: var(--config--main-color-brand, #f472b6);
    color: #ffffff;
    box-shadow: 0 6px 18px rgba(244, 114, 182, 0.5);
  }
  .sky-widget__cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 9px 22px rgba(0, 114, 201, 0.45);
  }
  .sky-widget__cta.is-hidden { display: none; }
</style>

<div class="sky-widget" id="skyWidget">
  <div class="sky-widget__brand" aria-hidden="true">
    <span class="sky-widget__brand-mark">sky</span>
    <span class="sky-widget__brand-tag">Community</span>
    <span class="sky-widget__brand-stripe"></span>
  </div>
  <div class="sky-widget__scene" aria-hidden="true">
    <div class="sky-widget__stars"></div>
    <div class="sky-widget__orb"></div>
    <div class="sky-widget__cloud sky-widget__cloud--1"></div>
    <div class="sky-widget__cloud sky-widget__cloud--2"></div>
    <div class="sky-widget__cloud sky-widget__cloud--3"></div>
  </div>
  <div class="sky-widget__content">
    <span class="sky-widget__badge">
      <span class="sky-widget__badge-star" aria-hidden="true">&#9733;</span>
      <span class="sky-widget__badge-text">SUPERUSER</span>
    </span>
    <h2 class="sky-widget__title">Welcome to the Sky Superusers Lounge</h2>
    <p class="sky-widget__subtitle">Thank you for sharing your knowledge and supporting fellow members of the Sky Community.</p>
    <a class="sky-widget__cta" href="https://sky-en-community.insided.com/p/superuser-lounge" rel="noopener noreferrer" target="_blank">Visit the Lounge</a>
  </div>
</div>

<script type="module" src="app.js"></script>
